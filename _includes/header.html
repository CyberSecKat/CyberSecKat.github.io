<header class="site-header">
  <div class="wrap site-header__inner">
    <a class="site-header__brand" href="{{ '/' | relative_url }}">
      <img class="site-header__logo" src="{{ site.logo | relative_url }}" alt="{{ site.title }} logo">
      <span class="site-header__name">{{ site.title }}</span>
    </a>

    <input type="checkbox" id="nav-toggle" class="nav-toggle" hidden>
    <label for="nav-toggle" class="nav-toggle__label" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </label>

    <nav class="site-nav">
      <ul>
        {% for item in site.nav %}
        <li>
          <a href="{{ item.url | relative_url }}"
             {% if page.url == item.url %}aria-current="page"{% endif %}>
            {{ item.title }}
          </a>
        </li>
        {% endfor %}
      </ul>
    </nav>
  </div>
</header>
