---
layout: default
---
<article class="post wrap">
  <header class="post__header">
    <p class="post__meta"><a href="{{ '/writings/' | relative_url }}">&larr; All writings</a></p>
    <h1 class="post__title">{{ page.title }}</h1>
    <p class="post__date">{{ page.date | date: '%B %-d, %Y' }}{% if page.tags and page.tags.size > 0 %} &middot; {{ page.tags | join: ', ' }}{% endif %}</p>
  </header>

  <div class="post__content">
    {{ content }}
  </div>
</article>
